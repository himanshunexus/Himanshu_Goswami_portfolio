{% load static %}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Himanshu Goswami | Minimalist Portfolio</title>
    <meta
      name="description"
      content="A high-end minimalist portfolio for Himanshu Goswami, focused on backend systems, Django, and practical product development."
    />
    <script>
      (function () {
        const storageKey = "portfolio-theme";
        try {
          const storedTheme = localStorage.getItem(storageKey);
          const preferredTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          const theme = storedTheme || preferredTheme;
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (error) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body class="overflow-x-hidden">
    <aside class="fixed inset-y-0 left-0 z-40 hidden w-20 border-r border-theme-subtle md:flex">
      <div class="flex w-full flex-col items-center justify-between py-8">
        <a
          href="#home"
          class="text-[0.8rem] font-light uppercase tracking-[0.18em]"
          aria-label="Go to home"
        >
          HG
        </a>

        <nav aria-label="Desktop navigation" class="flex flex-1 items-center justify-center">
          <div class="-rotate-90 whitespace-nowrap">
            <div class="flex items-center gap-10">
              <a href="#home" class="nav-link">HOME</a>
              <a href="#works" class="nav-link">WORKS</a>
            </div>
          </div>
        </nav>

        <div class="flex flex-col items-center gap-6">
          <a
            href="https://www.linkedin.com/in/himanshu-goswami-b88085350/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link opacity-40"
            aria-label="LinkedIn"
          >
            <i data-lucide="linkedin" class="h-5 w-5"></i>
          </a>
          <a
            href="https://www.instagram.com/mahi_goswami05/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link opacity-40"
            aria-label="Instagram"
          >
            <i data-lucide="instagram" class="h-5 w-5"></i>
          </a>
          <a
            href="https://github.com/himanshunexus"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link opacity-40"
            aria-label="GitHub"
          >
            <i data-lucide="github" class="h-5 w-5"></i>
          </a>
          <a
            href="https://leetcode.com/u/himanshugoswami05/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link opacity-40"
            aria-label="LeetCode"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              aria-hidden="true"
            >
              <path
                d="M14.181 4.5L7.5 11.181C7.086 11.595 7.086 12.267 7.5 12.681L14.181 19.362"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="square"
              />
              <path
                d="M9.75 12H20.25"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="square"
              />
              <path
                d="M14.708 1.875L18.579 5.747"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="square"
              />
            </svg>
          </a>
          <a
            href="mailto:himanshugoswami5060@gmail.com"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link opacity-40"
            aria-label="Email"
          >
            <i data-lucide="mail" class="h-5 w-5"></i>
          </a>
          <button
            type="button"
            class="mt-3 flex h-10 w-10 items-center justify-center border border-theme-subtle transition-opacity duration-150 hover:opacity-100"
            data-theme-toggle
            aria-label="Toggle dark mode"
          >
            <i data-lucide="moon" data-theme-icon="moon" class="h-4 w-4"></i>
            <i data-lucide="sun" data-theme-icon="sun" class="hidden h-4 w-4"></i>
          </button>
        </div>
      </div>
    </aside>

    <nav
      aria-label="Mobile navigation"
      class="fixed inset-x-0 bottom-0 z-50 border-t border-theme-subtle bg-theme md:hidden"
    >
      <div class="grid h-14 grid-cols-3">
        <a href="#home" class="flex items-center justify-center" aria-label="Home">
          <i data-lucide="house" class="h-5 w-5"></i>
        </a>
        <a href="#works" class="flex items-center justify-center" aria-label="Works">
          <i data-lucide="briefcase-business" class="h-5 w-5"></i>
        </a>
        <button
          type="button"
          class="flex items-center justify-center"
          data-theme-toggle
          aria-label="Toggle dark mode"
        >
          <i data-lucide="moon" data-theme-icon="moon" class="h-5 w-5"></i>
          <i data-lucide="sun" data-theme-icon="sun" class="hidden h-5 w-5"></i>
        </button>
      </div>
    </nav>

    <main class="pb-[calc(4rem+env(safe-area-inset-bottom))] md:ml-20 md:pb-0">
      {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
    <script src="{% static 'js/main.js' %}" defer></script>
  </body>
</html>
